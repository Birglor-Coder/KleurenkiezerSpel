<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kleurenleer Game</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f1f5f9;
      color: #0f172a;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 1100px;
      background: white;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      padding: 24px;
    }

    h1, h2, h3, h4, p {
      margin-top: 0;
    }

    .subtitle {
      color: #475569;
      margin-bottom: 24px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      align-items: start;
    }

    .card {
      background: white;
      border-radius: 24px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.06);
      padding: 24px;
    }

    .muted {
      color: #64748b;
      font-size: 14px;
    }

    .mix-row {
      display: flex;
      gap: 16px;
      align-items: center;
      margin-bottom: 24px;
    }

    .plus {
      font-size: 32px;
      font-weight: bold;
    }

    .circle-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .circle {
      width: 96px;
      height: 96px;
      border-radius: 999px;
      border: 1px solid #cbd5e1;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.12);
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    button.option {
      width: 100%;
      text-align: left;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid #cbd5e1;
      background: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    button.option:hover:not(:disabled) {
      background: #f8fafc;
    }

    button.option.correct {
      background: #dcfce7;
      border-color: #4ade80;
    }

    button.option.wrong {
      background: #fee2e2;
      border-color: #f87171;
    }

    button.option:disabled {
      cursor: default;
    }

    .feedback {
      margin-top: 16px;
      color: #334155;
      font-weight: 600;
    }

    .tags {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .tag {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 16px;
      background: #f8fafc;
      border: 1px solid #cbd5e1;
    }

    .tag-dot {
      width: 16px;
      height: 16px;
      border-radius: 999px;
    }

    .divider {
      border-top: 1px solid #e2e8f0;
      margin-top: 20px;
      padding-top: 20px;
    }

    .score {
      font-size: 40px;
      font-weight: bold;
      margin-top: 6px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .btn {
      border: 1px solid #cbd5e1;
      background: white;
      padding: 10px 14px;
      border-radius: 16px;
      cursor: pointer;
      font-weight: 600;
    }

    .btn:hover {
      background: #f8fafc;
    }

    .advice-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .advice-box {
      border: 1px solid #cbd5e1;
      background: #f8fafc;
      border-radius: 16px;
      padding: 16px;
      color: #334155;
      line-height: 1.6;
      font-size: 14px;
    }

    .advice-box.tip {
      background: #fffbeb;
      border-color: #fcd34d;
    }

    .finished {
      text-align: center;
      padding: 32px 12px;
    }

    .trophy {
      font-size: 56px;
      margin-bottom: 12px;
    }

    @media (max-width: 800px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="container">
      <h1>Kleurenleer Game</h1>
      <p class="subtitle">Leer primaire en secundaire kleuren door kleuren te combineren.</p>
      <div id="app"></div>
    </div>
  </div>

  <script>
    const COLORS = {
      rood: "#ef4444",
      geel: "#facc15",
      blauw: "#3b82f6",
      oranje: "#f97316",
      groen: "#22c55e",
      paars: "#a855f7",
    };

    const QUESTIONS = [
      { a: "rood", b: "geel", answer: "oranje" },
      { a: "geel", b: "blauw", answer: "groen" },
      { a: "rood", b: "blauw", answer: "paars" },
    ];

    function shuffle(array) {
      return [...array].sort(() => Math.random() - 0.5);
    }

    let state = {
      showAdvice: true,
      score: 0,
      questionIndex: 0,
      feedback: "",
      selected: null,
      finished: false,
    };

    function renderTag(label, color) {
      return `
        <div class="tag">
          <span class="tag-dot" style="background:${color}"></span>
          <span>${label}</span>
        </div>
      `;
    }

    function renderColorCircle(label, color) {
      return `
        <div class="circle-wrap">
          <div class="circle" style="background:${color}"></div>
          <span style="font-weight:600; text-transform:capitalize;">${label}</span>
        </div>
      `;
    }

    function handleAnswer(option) {
      if (state.selected || state.finished) return;

      const currentQuestion = QUESTIONS[state.questionIndex];
      state.selected = option;

      if (option === currentQuestion.answer) {
        state.score += 1;
        state.feedback = "Goed gedaan! 🎉";
      } else {
        state.feedback = "Nog niet goed. Het juiste antwoord is " + currentQuestion.answer + ".";
      }

      render();

      setTimeout(() => {
        if (state.questionIndex < QUESTIONS.length - 1) {
          state.questionIndex += 1;
          state.selected = null;
          state.feedback = "";
        } else {
          state.finished = true;
        }
        render();
      }, 1400);
    }

    function resetGame() {
      state.score = 0;
      state.questionIndex = 0;
      state.feedback = "";
      state.selected = null;
      state.finished = false;
      render();
    }

    function toggleAdvice() {
      state.showAdvice = !state.showAdvice;
      render();
    }

    function render() {
      const app = document.getElementById("app");

      if (state.finished) {
        app.innerHTML = `
          <div class="finished">
            <div class="trophy">🏆</div>
            <h2>Spel afgerond!</h2>
            <p style="font-size:20px; margin-bottom:24px;">
              Je score: <strong>${state.score} / ${QUESTIONS.length}</strong>
            </p>
            <button class="btn" onclick="resetGame()">Opnieuw spelen</button>
          </div>
        `;
        return;
      }

      const currentQuestion = QUESTIONS[state.questionIndex];
      const options = shuffle([
        currentQuestion.answer,
        ...shuffle(Object.keys(COLORS).filter(c => c !== currentQuestion.answer)).slice(0, 2)
      ]);

      app.innerHTML = `
        <div class="grid">
          <div class="card">
            <p class="muted">Vraag ${state.questionIndex + 1} van ${QUESTIONS.length}</p>
            <h2>Welke kleur krijg je als je deze twee kleuren mengt?</h2>

            <div class="mix-row">
              ${renderColorCircle(currentQuestion.a, COLORS[currentQuestion.a])}
              <div class="plus">+</div>
              ${renderColorCircle(currentQuestion.b, COLORS[currentQuestion.b])}
            </div>

            <div class="options">
              ${options.map(option => {
                const isCorrect = state.selected && option === currentQuestion.answer;
                const isWrong = state.selected === option && option !== currentQuestion.answer;
                const className = isCorrect ? "correct" : isWrong ? "wrong" : "";
                return `
                  <button
                    class="option ${className}"
                    onclick="handleAnswer('${option}')"
                    ${state.selected ? "disabled" : ""}
                  >
                    ${option}
                  </button>
                `;
              }).join("")}
            </div>

            ${state.feedback ? `<div class="feedback">${state.feedback}</div>` : ""}
          </div>

          <div class="card">
            <h3>Kleurenhulp</h3>

            <div style="margin-bottom:20px;">
              <p style="font-weight:700; margin-bottom:10px;">Primaire kleuren</p>
              <div class="tags">
                ${renderTag("Rood", COLORS.rood)}
                ${renderTag("Geel", COLORS.geel)}
                ${renderTag("Blauw", COLORS.blauw)}
              </div>
            </div>

            <div style="margin-bottom:20px;">
              <p style="font-weight:700; margin-bottom:10px;">Secundaire kleuren</p>
              <div class="tags">
                ${renderTag("Oranje", COLORS.oranje)}
                ${renderTag("Groen", COLORS.groen)}
                ${renderTag("Paars", COLORS.paars)}
              </div>
            </div>

            <div class="divider">
              <p style="font-weight:700;">Score</p>
              <div class="score">${state.score}</div>
            </div>
    render();
  </script>
</body>
</html>
